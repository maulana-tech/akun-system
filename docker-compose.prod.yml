version: '3.8'

services:
  # In DewaCloud, you might use their managed DB. 
  # If so, remove the 'db' service and update DATABASE_URL.
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-akuntansi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-akuntansi123}
      POSTGRES_DB: ${DB_NAME:-akuntansi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-akuntansi}:${DB_PASSWORD:-akuntansi123}@db:5432/${DB_NAME:-akuntansi_db}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
